<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="theme-color" content="#4ade80">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Финансы">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Финансовый Советник</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0e0a;
  --surface: #111611;
  --panel: #161e16;
  --border: #1f2d1f;
  --accent: #4ade80;
  --accent-dim: #22c55e33;
  --accent-glow: #4ade8018;
  --text: #e8f0e8;
  --muted: #6b7f6b;
  --danger: #f87171;
  --gold: #fbbf24;
  --mono: 'JetBrains Mono', monospace;
  --serif: 'Playfair Display', serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.6;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
}

/* ── LAYOUT ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh; height: -webkit-fill-available;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

@supports (height: 100dvh) {
  .app { height: 100dvh; height: -webkit-fill-available; }
}

/* ── HEADER ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent)55, transparent);
}

.logo {
  font-family: var(--serif);
  font-size: 16px;
  color: var(--accent);
}

.logo small {
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  font-style: italic;
  margin-left: 6px;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}

.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.balance-pill {
  background: var(--accent-dim);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
}

/* ── TABS ── */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ── VIEWS ── */
.view { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.view.active { display: flex; }

/* ── CHAT VIEW ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.messages::-webkit-scrollbar { display: none; }

.msg { display: flex; gap: 10px; animation: fadeUp 0.25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  margin-top: 2px;
}

.msg.ai .msg-avatar { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); }
.msg.user .msg-avatar { background: #1a2540; border: 1px solid #334; color: #7090d0; }

.msg-bubble {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 2px;
  font-size: 13px;
  line-height: 1.65;
}

.msg.ai .msg-bubble {
  background: var(--panel);
  border: 1px solid var(--border);
  border-left: 2px solid var(--accent);
}

.msg.user .msg-bubble {
  background: #111827;
  border: 1px solid #1f2d40;
  border-right: 2px solid #4a90d0;
}

.msg-bubble b { color: var(--accent); }
.tag {
  display: inline-block;
  background: var(--accent-dim);
  border: 1px solid var(--accent)66;
  color: var(--accent);
  padding: 1px 5px;
  border-radius: 2px;
  font-size: 10px;
  margin: 1px;
}

.msg-time { font-size: 10px; color: var(--muted); margin-top: 3px; padding: 0 4px; }
.msg.user .msg-time { text-align: right; }

.quick-actions {
  padding: 8px 16px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
}
.quick-actions::-webkit-scrollbar { display: none; }

.quick-btn {
  padding: 6px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 16px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  flex-shrink: 0;
}
.quick-btn:hover, .quick-btn:active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

.input-area {
  padding: 10px 16px 12px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
}

.input-area::before {
  content: '';
  position: absolute;
  top: 0; left: 16px; right: 16px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent)33, transparent);
}

.input-row { display: flex; gap: 8px; align-items: flex-end; }

.input-box {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  resize: none;
  outline: none;
  min-height: 42px;
  max-height: 100px;
  transition: border-color 0.2s;
  line-height: 1.5;
  -webkit-appearance: none;
}
.input-box:focus { border-color: var(--accent); }
.input-box::placeholder { color: var(--muted); }

.send-btn {
  width: 42px; height: 42px;
  background: var(--accent);
  border: none;
  border-radius: 4px;
  color: var(--bg);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.send-btn:active { background: #6bef98; transform: scale(0.97); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; }

/* ── TYPING ── */
.typing { display: flex; align-items: center; gap: 4px; padding: 8px 14px; }
.typing span { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* ── STATS VIEW ── */
.stats-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  -webkit-overflow-scrolling: touch;
}
.stats-scroll::-webkit-scrollbar { display: none; }

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.stat-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
}

.stat-card.full { grid-column: 1/-1; }

.stat-label {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.stat-value {
  font-family: var(--serif);
  font-size: 24px;
  letter-spacing: -0.02em;
}
.stat-value.income { color: var(--accent); }
.stat-value.expense { color: var(--danger); }
.stat-value.balance-pos { color: var(--accent); }
.stat-value.balance-neg { color: var(--danger); }
.stat-value.savings { color: var(--gold); }

.section-title {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  margin-top: 4px;
}

.cat-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.cat-info { flex: 1; }
.cat-name { font-size: 12px; }
.cat-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 3px; overflow: hidden; }
.cat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.cat-amount { font-size: 12px; color: var(--muted); white-space: nowrap; }

/* ── TX VIEW ── */
.tx-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.tx-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.tx-list::-webkit-scrollbar { display: none; }

.tx-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.tx-item:active { background: var(--panel); }

.tx-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.tx-icon.income { background: #052015; }
.tx-icon.expense { background: #200505; }

.tx-info { flex: 1; min-width: 0; }
.tx-desc { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }

.tx-amount { font-size: 14px; font-weight: 500; text-align: right; }
.tx-amount.income { color: var(--accent); }
.tx-amount.expense { color: var(--danger); }

.tx-delete {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--muted);
  font-size: 12px;
  padding: 4px 8px;
  cursor: pointer;
}
.tx-delete:active { border-color: var(--danger); color: var(--danger); }

.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--muted);
}
.empty-state .big {
  font-family: var(--serif);
  font-size: 48px;
  color: var(--accent);
  display: block;
  margin-bottom: 8px;
  opacity: 0.5;
}

/* ── FAB ── */
.fab { display: none; }
.add-btn {
  width: 28px; height: 28px;
  background: var(--accent);
  border: none;
  border-radius: 50%;
  color: var(--bg);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  line-height: 1;
  transition: all 0.15s;
}
.add-btn:active { transform: scale(0.93); }

/* ── KEYBOARD FIX ── */
html {
  height: -webkit-fill-available;
}
.app {
  min-height: -webkit-fill-available;
}
.input-area {
  position: sticky;
  bottom: 0;
  background: var(--bg);
  z-index: 10;
}
.quick-actions {
  position: sticky;
  bottom: 0;
  background: var(--bg);
  z-index: 9;
}

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #000b;
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--panel);
  border: 1px solid var(--border);
  border-top: 2px solid var(--accent);
  border-radius: 12px 12px 0 0;
  padding: 24px 20px calc(24px + var(--safe-bottom));
  width: 100%;
  max-width: 500px;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 20px;
}

.modal h3 {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--accent);
  margin-bottom: 20px;
}

.form-group { margin-bottom: 14px; }

.form-label {
  display: block;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.form-input, .form-select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-select option { background: var(--panel); }

.type-toggle { display: flex; gap: 8px; }
.type-btn {
  flex: 1;
  padding: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.type-btn.active-income { background: #052015; border-color: var(--accent); color: var(--accent); }
.type-btn.active-expense { background: #200505; border-color: var(--danger); color: var(--danger); }

.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.btn {
  flex: 1;
  padding: 12px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 13px;
  cursor: pointer;
  border: 1px solid;
  transition: all 0.15s;
}
.btn-primary { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
.btn-primary:active { background: #6bef98; }
.btn-ghost { background: transparent; border-color: var(--border); color: var(--muted); }
.btn-ghost:active { border-color: var(--muted); }

/* ── WELCOME ── */
.welcome {
  text-align: center;
  padding: 48px 24px 24px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.8;
}
.welcome .ruble {
  font-family: var(--serif);
  font-size: 52px;
  color: var(--accent);
  display: block;
  margin-bottom: 12px;
  opacity: 0.7;
}
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <header class="header">
    <div class="logo">Советник <small>// AI</small></div>
    <div class="header-right">
      <div class="dot"></div>
      <div class="balance-pill" id="headerBalance" onclick="switchTab('stats')">0 ₽</div>
      <button class="add-btn" onclick="openModal()">+</button>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('chat')">💬 Чат</div>
    <div class="tab" onclick="switchTab('stats')">📊 Аналитика</div>
    <div class="tab" onclick="switchTab('transactions')">📋 История</div>
  </div>

  <!-- CHAT VIEW -->
  <div class="view active" id="view-chat">
    <div class="messages" id="messages">
      <div class="welcome">
        <span class="ruble">₽</span>
        Привет! Я ваш личный финансовый советник.<br>
        Добавляйте доходы и расходы через <b style="color:var(--accent)">+</b>,<br>
        а здесь задавайте любые вопросы.
      </div>
    </div>

    <div class="quick-actions">
      <button class="quick-btn" onclick="sendQuick('Проанализируй мои расходы')">📊 Анализ</button>
      <button class="quick-btn" onclick="sendQuick('Как увеличить сбережения?')">💰 Сбережения</button>
      <button class="quick-btn" onclick="sendQuick('Составь бюджет на месяц')">📋 Бюджет</button>
      <button class="quick-btn" onclick="sendQuick('Где я трачу лишнее?')">🔍 Оптимизация</button>
      <button class="quick-btn" onclick="sendQuick('Дай совет по инвестициям')">📈 Инвестиции</button>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea
          class="input-box"
          id="userInput"
          placeholder="Спросите о ваших финансах..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>

  <!-- STATS VIEW -->
  <div class="view" id="view-stats">
    <div class="stats-scroll" id="statsContent">
      <div class="empty-state">
        <span class="big">₽</span>
        Добавьте транзакции для аналитики
      </div>
    </div>
  </div>

  <!-- TRANSACTIONS VIEW -->
  <div class="view" id="view-transactions">
    <div class="tx-header">
      <span style="font-size:12px;color:var(--muted)" id="txCount">0 транзакций</span>
      <button onclick="clearData()" style="background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer">Сбросить</button>
    </div>
    <div class="tx-list" id="txList">
      <div class="empty-state">
        <span class="big">₽</span>
        Нет транзакций
      </div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()">+</button>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Добавить</h3>

    <div class="form-group">
      <div class="type-toggle">
        <button class="type-btn active-income" id="btnIncome" onclick="setType('income')">▲ Доход</button>
        <button class="type-btn" id="btnExpense" onclick="setType('expense')">▼ Расход</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Сумма (₽)</label>
      <input class="form-input" id="txAmount" type="number" inputmode="decimal" placeholder="0" min="0">
    </div>

    <div class="form-group">
      <label class="form-label">Описание</label>
      <input class="form-input" id="txDesc" type="text" placeholder="Зарплата, Продукты...">
    </div>

    <div class="form-group" id="categoryGroup">
      <label class="form-label">Категория</label>
      <select class="form-select" id="txCategory">
        <option value="Еда">🍔 Еда и продукты</option>
        <option value="Транспорт">🚗 Транспорт</option>
        <option value="Жильё">🏠 Жильё и ЖКХ</option>
        <option value="Развлечения">🎮 Развлечения</option>
        <option value="Здоровье">💊 Здоровье</option>
        <option value="Одежда">👕 Одежда</option>
        <option value="Техника">💻 Техника</option>
        <option value="Образование">📚 Образование</option>
        <option value="Прочее">📦 Прочее</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="addTransaction()">Добавить</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────
let transactions = JSON.parse(localStorage.getItem('fin_tx') || '[]');
let txType = 'income';
let currentTab = 'chat';

const COLORS = {
  'Еда':'#f87171','Транспорт':'#fb923c','Жильё':'#facc15',
  'Развлечения':'#a78bfa','Здоровье':'#34d399','Одежда':'#60a5fa',
  'Техника':'#f472b6','Образование':'#4ade80','Прочее':'#94a3b8'
};

const CAT_EMOJI = {
  'Еда':'🍔','Транспорт':'🚗','Жильё':'🏠','Развлечения':'🎮',
  'Здоровье':'💊','Одежда':'👕','Техника':'💻','Образование':'📚','Прочее':'📦'
};

// ── INIT ───────────────────────────────────────────────────────────
updateAll();
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── TABS ───────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['chat','stats','transactions'][i] === tab);
  });
  document.querySelectorAll('.view').forEach(v => {
    v.classList.toggle('active', v.id === 'view-' + tab);
  });
  if (tab === 'stats') renderStats();
  if (tab === 'transactions') renderTx();
}

// ── CALCULATIONS ───────────────────────────────────────────────────
function getStats() {
  const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const balance = income - expense;
  const rate = income > 0 ? Math.round((income - expense) / income * 100) : null;
  const cats = {};
  transactions.filter(t => t.type === 'expense').forEach(t => {
    cats[t.category] = (cats[t.category] || 0) + t.amount;
  });
  return { income, expense, balance, rate, cats };
}

function fmt(n) {
  return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(n);
}

function updateAll() {
  const { balance } = getStats();
  document.getElementById('headerBalance').textContent = fmt(balance);
  document.getElementById('headerBalance').style.color = balance >= 0 ? 'var(--accent)' : 'var(--danger)';
}

// ── STATS ──────────────────────────────────────────────────────────
function renderStats() {
  const { income, expense, balance, rate, cats } = getStats();
  const el = document.getElementById('statsContent');

  if (transactions.length === 0) {
    el.innerHTML = '<div class="empty-state"><span class="big">₽</span>Добавьте транзакции для аналитики</div>';
    return;
  }

  const maxCat = Math.max(...Object.values(cats), 1);
  const catRows = Object.entries(cats)
    .sort((a, b) => b[1] - a[1])
    .map(([cat, val]) => `
      <div class="cat-row">
        <div class="cat-dot" style="background:${COLORS[cat]||'#888'}"></div>
        <div class="cat-info">
          <div class="cat-name">${CAT_EMOJI[cat]||''} ${cat}</div>
          <div class="cat-bar-wrap">
            <div class="cat-bar-fill" style="width:${val/maxCat*100}%;background:${COLORS[cat]||'#888'}"></div>
          </div>
        </div>
        <div class="cat-amount">${fmt(val)}</div>
      </div>
    `).join('');

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Доходы</div>
        <div class="stat-value income">${fmt(income)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Расходы</div>
        <div class="stat-value expense">${fmt(expense)}</div>
      </div>
      <div class="stat-card full">
        <div class="stat-label">Баланс</div>
        <div class="stat-value ${balance >= 0 ? 'balance-pos' : 'balance-neg'}">${fmt(balance)}</div>
      </div>
      <div class="stat-card full">
        <div class="stat-label">Норма сбережений</div>
        <div class="stat-value savings">${rate !== null ? rate + '%' : '—'}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:4px">${
          rate === null ? 'Нет данных' :
          rate >= 20 ? '✓ Отличный показатель' :
          rate >= 10 ? '~ Можно лучше' :
          '⚠ Низкий уровень сбережений'
        }</div>
      </div>
    </div>
    ${Object.keys(cats).length > 0 ? `
      <div class="section-title">Расходы по категориям</div>
      ${catRows}
    ` : ''}
  `;
}

// ── TRANSACTIONS ────────────────────────────────────────────────────
function renderTx() {
  const count = transactions.length;
  document.getElementById('txCount').textContent = count + ' ' + plural(count, 'транзакция','транзакции','транзакций');

  const el = document.getElementById('txList');
  if (count === 0) {
    el.innerHTML = '<div class="empty-state"><span class="big">₽</span>Нет транзакций</div>';
    return;
  }

  el.innerHTML = [...transactions].reverse().map(t => `
    <div class="tx-item">
      <div class="tx-icon ${t.type}">${t.type === 'income' ? '💰' : (CAT_EMOJI[t.category]||'💸')}</div>
      <div class="tx-info">
        <div class="tx-desc">${escHtml(t.description)}</div>
        <div class="tx-meta">${t.date}${t.category && t.type === 'expense' ? ' · ' + t.category : ''}</div>
      </div>
      <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
      <button class="tx-delete" onclick="deleteTx(${t.id})">✕</button>
    </div>
  `).join('');
}

function deleteTx(id) {
  transactions = transactions.filter(t => t.id !== id);
  save();
  renderTx();
  updateAll();
}

function plural(n, a, b, c) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return a;
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return b;
  return c;
}

// ── MODAL ──────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('txAmount').focus(), 300);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function setType(type) {
  txType = type;
  document.getElementById('btnIncome').className = 'type-btn' + (type === 'income' ? ' active-income' : '');
  document.getElementById('btnExpense').className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
  document.getElementById('categoryGroup').style.display = type === 'expense' ? 'block' : 'none';
}
setType('income');

function addTransaction() {
  const amount = parseFloat(document.getElementById('txAmount').value);
  const desc = document.getElementById('txDesc').value.trim();
  if (!amount || !desc) return;

  const tx = {
    id: Date.now(),
    type: txType,
    amount,
    description: desc,
    category: txType === 'expense' ? document.getElementById('txCategory').value : null,
    date: new Date().toLocaleDateString('ru-RU')
  };

  transactions.push(tx);
  save();
  updateAll();
  closeModal();

  document.getElementById('txAmount').value = '';
  document.getElementById('txDesc').value = '';

  const sign = txType === 'income' ? '+' : '-';
  const col = txType === 'income' ? 'var(--accent)' : 'var(--danger)';
  addAIMessage(`Записал: <b style="color:${col}">${sign}${fmt(amount)}</b> — ${escHtml(desc)}${tx.category ? ' <span class="tag">' + tx.category + '</span>' : ''}. Баланс: ${fmt(getStats().balance)}`);

  if (currentTab === 'stats') renderStats();
  if (currentTab === 'transactions') renderTx();

  switchTab('chat');
}

// ── CHAT ───────────────────────────────────────────────────────────
function getTime() {
  return new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const w = msgs.querySelector('.welcome');
  if (w) w.remove();
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `
    <div>
      <div class="msg-bubble">${escHtml(text)}</div>
      <div class="msg-time">${getTime()}</div>
    </div>
    <div class="msg-avatar">М</div>
  `;
  msgs.appendChild(msg);
  msgs.scrollTop = msgs.scrollHeight;
}

function addAIMessage(html) {
  const msgs = document.getElementById('messages');
  const w = msgs.querySelector('.welcome');
  if (w) w.remove();
  const msg = document.createElement('div');
  msg.className = 'msg ai';
  msg.innerHTML = `
    <div class="msg-avatar">₽</div>
    <div>
      <div class="msg-bubble">${html}</div>
      <div class="msg-time">${getTime()}</div>
    </div>
  `;
  msgs.appendChild(msg);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg ai';
  d.id = 'typing';
  d.innerHTML = `<div class="msg-avatar">₽</div><div class="msg-bubble typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() { const e = document.getElementById('typing'); if (e) e.remove(); }

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildContext() {
  if (!transactions.length) return 'Транзакций пока нет.';
  const { income, expense, balance, rate, cats } = getStats();
  const catStr = Object.entries(cats).map(([k,v]) => `${k}: ${v}₽`).join(', ');
  const recent = transactions.slice(-15).map(t =>
    `${t.date} | ${t.type==='income'?'+':'-'}${t.amount}₽ | ${t.description}${t.category?' ['+t.category+']':''}`
  ).join('\n');
  return `Доходы: ${income}₽\nРасходы: ${expense}₽\nБаланс: ${balance}₽\nНорма сбережений: ${rate!==null?rate+'%':'—'}\nКатегории расходов: ${catStr||'нет'}\nПоследние транзакции:\n${recent}`;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  addUserMessage(text);
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  addTyping();

  const systemPrompt = `Ты — персональный финансовый советник. Говори по-русски, кратко и по делу. Ты бухгалтер, экономист и консультант в одном лице. Помогаешь управлять личными финансами, анализируешь доходы/расходы, даёшь советы по экономии и инвестициям.

Финансовые данные пользователя:
${buildContext()}

Давай конкретные советы на основе реальных данных. Если данных мало — скажи что нужно добавить транзакции. Не используй markdown, отвечай обычным текстом.`;

  try {
    const GEMINI_KEY = 'AIzaSyDIw-k_hS7ciGIxuJxaS1L7Bu7JVTDewJA';
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: systemPrompt + '\n\nВопрос пользователя: ' + text }] }],
        generationConfig: { maxOutputTokens: 1000 }
      })
    });
    const data = await res.json();
    removeTyping();
    if (data.error) {
      addAIMessage('Ошибка API: ' + escHtml(data.error.message || JSON.stringify(data.error)));
      document.getElementById('sendBtn').disabled = false;
      return;
    }
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Нет ответа: ' + JSON.stringify(data).slice(0, 200);
    addAIMessage(escHtml(reply).replace(/\n/g, '<br>'));
  } catch {
    removeTyping();
    addAIMessage('Ошибка соединения. Проверьте интернет.');
  }

  document.getElementById('sendBtn').disabled = false;
}

function sendQuick(text) {
  switchTab('chat');
  document.getElementById('userInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function save() { localStorage.setItem('fin_tx', JSON.stringify(transactions)); }

// Scroll to bottom when keyboard opens
const inputBox = document.getElementById('userInput');
if (inputBox) {
  inputBox.addEventListener('focus', () => {
    setTimeout(() => {
      inputBox.scrollIntoView({ behavior: 'smooth', block: 'end' });
      const msgs = document.getElementById('messages');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }, 300);
  });
}

function clearData() {
  if (!confirm('Удалить все транзакции?')) return;
  transactions = [];
  save();
  updateAll();
  renderTx();
  addAIMessage('Все транзакции удалены. Начинаем с чистого листа.');
  switchTab('chat');
}
</script>
</body>
</html>
